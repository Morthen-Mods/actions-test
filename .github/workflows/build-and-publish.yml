name: Build and Publish Mod

on:
  workflow_dispatch:

concurrency:
  group: publish-mod
  cancel-in-progress: false


jobs:
  # Read Mod properties and safe them in
  read_properties:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v7
      - name: Read Properties from gradle.properties
        run: |
          echo "TEST_VARIABLE=$(grep '^group=' ./gradle.properties | cut -d'=' -f2)" >> "$GITHUB_ENV"
      - name: Test variable
        run: |
          echo "$TEST_VARIABLE"
          echo ${{ env.TEST_VARIABLE }}
          

