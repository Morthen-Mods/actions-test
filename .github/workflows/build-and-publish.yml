name: Build and Publish Mod

on:
  workflow_dispatch:

concurrency:
  group: publish-mod
  cancel-in-progress: false

env:
  JAVA_VERSION: 25

jobs:
  # Read Mod properties and safe them in
  read_properties:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v7
      - name: Read Properties from gradle.properties
        run: |
          # Base variables
          echo "MODRINTH_ID=$(grep '^modrinth_id=' ./gradle.properties | cut -d'=' -f2)" >> "$GITHUB_ENV"
          echo "CURSEFORGE_ID=$(grep '^curseforge_id=' ./gradle.properties | cut -d'=' -f2)" >> "$GITHUB_ENV"
          echo "MINECRAFT_VERSION=$(grep '^minecraft_version=' ./gradle.properties | cut -d'=' -f2)" >> "$GITHUB_ENV"
          # Mod related
          echo "MOD_VERSION=$(grep '^mod_version=' ./gradle.properties | cut -d'=' -f2)" >> "$GITHUB_ENV"
          echo "MOD_ENVIRONMENT=$(grep '^mod_environment=' ./gradle.properties | cut -d'=' -f2)" >> "$GITHUB_ENV"
          echo "MOD_DEPENDENCIES=$(grep '^mod_dependencies=' ./gradle.properties | cut -d'=' -f2)" >> "$GITHUB_ENV"

  # Test if everything compiles without any issue
  compile:
    needs: read_properties
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v7
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Compile Java
        run: gradle compileJava --no-daemon | echo ${{ env.CURSEFORGE_ID }}

  # Run all Gametest tasks
  gametests:
    needs: compile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v7
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Run Fabric Gametests
        run: gradle :fabric:runGameTest
      - name: Run Forge Gametests
        run: gradle :forge:runGameTestServer
      - name: Run Neoforge Gametests
        run: gradle :neoforge:runGameTestServer

  # Next up we build the jar files and store them for later usages

  # Now we upload the files to Curseforge and Modrinth

  # The last task will be the upload to the maven repository, this will only trigger when the MAVEN_REPO variable is set