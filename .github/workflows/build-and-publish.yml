name: Build and Publish Mod

on:
  workflow_dispatch:

concurrency:
  group: publish-mod
  cancel-in-progress: false

env:
  JAVA_VERSION: 25

jobs:
  # Test if everything compiles without any issue
  compile_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle
      - name: Build Jar files
        run: ./gradlew compileJava --no-daemon

  fabric_gametest:
    needs: compile_test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle
      - name: Build Jar files
        run: ./gradlew :fabric:runGameTest --no-deamon

  forge_gametest:
    needs: compile_test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle
      - name: Build Jar files
        run: ./gradlew :forge:runGameTestServer --no-deamon

  neoforge_gametest:
    needs: compile_test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle
      - name: Build Jar files
        run: ./gradlew :neoforge:runGameTestServer --no-deamon