name: Validate Secrets

on:
  workflow_dispatch:

jobs:
  load-variables:
    runs-on: ubuntu-latest
    steps:
      - name: Load gradle.properties file
        id: load_gradle
        run: cat "./gradle.properties" >> "$GITHUB_ENV"

      - name: Print properties
        id: print_properties
        run: echo $GITHUB_ENV.mod_id | echo $GITHUB_ENV.mod_name


  check-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Check if secrets are set
        env:
          MY_SECRET_1: ${{ secrets.MODRINTH_API_TOKEN }}
          MY_SECRET_2: ${{ secrets.CURSEFORGE_API_TOKEN }}
        run: |
          check_secret() {
            local name="$1"
            local value="$2"
            if [ -z "$value" ]; then
              echo "❌ $name ist NICHT gesetzt oder leer"
              return 1
            else
              echo "✅ $name ist gesetzt (Länge: ${#value} Zeichen)"
              return 0
            fi
          }

          FAILED=0
          check_secret "MY_SECRET_1" "$MY_SECRET_1" || FAILED=1
          check_secret "MY_SECRET_2" "$MY_SECRET_2" || FAILED=1

          if [ "$FAILED" -eq 1 ]; then
            echo "::error::Mindestens ein Secret fehlt!"
            exit 1
          fi